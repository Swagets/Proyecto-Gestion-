{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PowerMedical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'usuarios/css/style.css' %}" rel="stylesheet">
</head>
<body>

    <div class="pm-login-wrapper">
        <div class="pm-login-card">

            <div class="pm-login-header">
                <i class="bi bi-hospital"></i>
                <h2>PowerMedical</h2>
                <p>Sistema de Gestión Médica</p>
            </div>

            <div class="pm-login-body">
                {% if form.errors %}
                    <div class="pm-alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                        Usuario o contraseña incorrectos. Intente nuevamente.
                    </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">
                            <i class="bi bi-person me-1"></i>Usuario
                        </label>
                        <input type="text"
                               name="username"
                               id="id_username"
                               class="form-control"
                               placeholder="Ingrese su usuario"
                               autofocus
                               required>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Contraseña
                        </label>
                        <input type="password"
                               name="password"
                               id="id_password"
                               class="form-control"
                               placeholder="Ingrese su contraseña"
                               required>
                    </div>

                    <button type="submit" class="pm-btn pm-btn-primary w-100 justify-content-center">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Iniciar Sesión
                    </button>
                </form>
            </div>

            <div class="pm-login-footer">
                <small class="text-muted">&copy; 2026 PowerMedical. Todos los derechos reservados.</small>
            </div>

        </div>
    </div>

</body>
</html>
