{% extends 'usuarios/base.html' %}

{% block title %}Detalle de Compra - PowerMedical{% endblock %}

{% block content %}

<div class="pm-page-header">
    <h2><i class="bi bi-cart-plus me-2"></i>Registrar Compra</h2>
</div>

<div class="pm-card">
    <div class="pm-card-body pm-empty">
        <i class="bi bi-arrow-repeat d-block"></i>
        <p>Serás redirigido a la pantalla de registro de compras...</p>
        <a href="{% url 'registrar_compra' %}" class="pm-btn pm-btn-primary mt-2">
            <i class="bi bi-box-arrow-right"></i> Ir a Registrar Compra
        </a>
    </div>
</div>

<script>
    setTimeout(function() {
        window.location.href = "{% url 'registrar_compra' %}";
    }, 1000);
</script>

{% endblock %}
